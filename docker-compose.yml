# ============================================================
# MediDrishti AI — Docker Compose
# ============================================================
# Usage:
#   docker-compose up --build        (build & start)
#   docker-compose up -d             (detached / background)
#   docker-compose down              (stop & remove containers)
#   docker-compose logs -f           (follow logs)
# ============================================================

services:
  # ── MediDrishti AI (Streamlit App) ──────────────────────────
  medidrishti-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medidrishti-ai
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - KMP_DUPLICATE_LIB_OK=TRUE
    volumes:
      # Persist uploaded files across container restarts
      - upload_data:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

# ── Named Volumes ─────────────────────────────────────────────
volumes:
  upload_data:
    driver: local
